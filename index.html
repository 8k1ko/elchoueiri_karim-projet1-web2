<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Test Page</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        color: white;
        text-align: center;
        padding: 50px;
    }

    .box {
        background: rgba(255,255,255,0.1);
        padding: 30px;
        border-radius: 15px;
        display: inline-block;
        backdrop-filter: blur(10px);
    }

    button {
        margin-top: 20px;
        padding: 12px 25px;
        border: none;
        border-radius: 8px;
        background: #ffcc00;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background: #ffaa00;
    }
</style>
</head>

<body>

<div class="box">
    <h1>HTML Test Page 🚀</h1>
    <p>If you can see this, your HTML is working.</p>

    <button onclick="randomMessage()">Click Me</button>

    <p id="message"></p>
</div>

<script>
function randomMessage() {
    const messages = [
        "Hello World!",
        "Your code works!",
        "Testing successful!",
        "JavaScript is running!",
        "Random message generated!"
    ];

    const randomIndex = Math.floor(Math.random() * messages.length);
    document.getElementById("message").textContent = messages[randomIndex];
}
</script>

</body>
</html>
